<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Provider Taxonomy</title>
<style>
  /* ---------- design tokens (light default; dark via [data-theme=dark]) ---------- */
  :root {
    --bg:#fbfbf9; --panel:#ffffff; --panel2:#f5f4f0; --line:#e7e4dd; --line-soft:#efece6;
    --ink:#1a1c20; --muted:#646b76; --faint:#9aa1ab;
    --accent:#5b5bd6; --accent-ink:#ffffff; --accent-soft:rgba(91,91,214,.10);
    --green:#15a34a; --amber:#c2710c; --red:#dc2626; --blue:#2563eb; --purple:#7c3aed; --grey:#9ca3af;
    --anthropic:#cc785c; --openai:#0a8a6e; --google:#4f86ff;
    --shadow:0 1px 2px rgba(20,22,40,.05), 0 2px 10px rgba(20,22,40,.05);
    --shadow-lift:0 6px 18px rgba(20,22,40,.12);
  }
  [data-theme="dark"] {
    --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --line:#2a2f3a; --line-soft:#222732;
    --ink:#e7e9ee; --muted:#9aa3b2; --faint:#6b7280;
    --accent:#8b8bf0; --accent-ink:#0f1115; --accent-soft:rgba(139,139,240,.14);
    --green:#3fb950; --amber:#d29922; --red:#f85149; --blue:#58a6ff; --purple:#bc8cff; --grey:#7d8590;
    --anthropic:#d9a066; --openai:#10a37f; --google:#4f86ff;
    --shadow:none; --shadow-lift:0 6px 20px rgba(0,0,0,.45);
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:14.5px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; }
  a { color:var(--accent); text-decoration:none; cursor:pointer; } a:hover { text-decoration:underline; }
  h3 { font-size:15px; font-weight:650; margin:18px 0 8px; letter-spacing:-.01em; }
  .muted { color:var(--muted); } .faint { color:var(--faint); } .small { font-size:12px; }

  /* ---------- header + nav ---------- */
  header { padding:14px 22px 0; border-bottom:1px solid var(--line); background:var(--panel);
    position:sticky; top:0; z-index:6; }
  .bar { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .brand { font-size:17px; font-weight:680; letter-spacing:-.02em; }
  .brand .mark { color:var(--accent); margin-right:5px; }
  .brand small { color:var(--muted); font-weight:400; font-size:12px; margin-left:8px; letter-spacing:0; }
  .bar-right { display:flex; align-items:center; gap:10px; }
  .iconbtn { background:var(--panel2); border:1px solid var(--line); color:var(--muted);
    width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:14px; line-height:1;
    display:inline-flex; align-items:center; justify-content:center; transition:.15s; }
  .iconbtn:hover { color:var(--ink); border-color:var(--accent); }
  .tagline { margin:8px 0 0; color:var(--muted); font-size:13px; max-width:940px; }
  .tagline a { white-space:nowrap; }
  nav { display:flex; gap:2px; margin-top:10px; overflow-x:auto; }
  nav button { background:none; border:none; color:var(--muted); padding:9px 14px; cursor:pointer;
    border-bottom:2px solid transparent; font-size:13.5px; white-space:nowrap; transition:.15s; }
  nav button:hover { color:var(--ink); }
  nav button.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }

  main { padding:22px 22px 90px; max-width:1280px; margin:0 auto; }
  .section-intro { color:var(--muted); font-size:13.5px; margin-bottom:14px; max-width:860px; }
  .row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  select { background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:7px 9px; font:inherit; }

  /* ---------- banner / pills / metrics ---------- */
  .banner { margin:10px 0 0; padding:9px 12px; border-radius:9px; font-size:13px; }
  .banner.bad { background:color-mix(in srgb,var(--red) 12%,transparent); border:1px solid color-mix(in srgb,var(--red) 40%,transparent); }
  .banner ul { margin:6px 0 0; padding-left:18px; } .banner code { color:var(--muted); }
  .pill { font-size:11px; padding:2px 9px; border-radius:999px; background:var(--panel2); border:1px solid var(--line); color:var(--muted); }
  .pill.ok { color:var(--green); background:color-mix(in srgb,var(--green) 13%,transparent); border-color:color-mix(in srgb,var(--green) 35%,transparent); }
  .metrics { display:flex; flex-wrap:wrap; gap:10px 18px; margin:4px 0 4px; font-size:12.5px; color:var(--muted); }
  .metrics b { color:var(--ink); }

  /* ---------- pivot grid ---------- */
  .pivotwrap { overflow-x:auto; margin-top:14px; }
  .pivot { display:grid; gap:12px; min-width:720px; }
  .colhead { font-weight:650; padding:6px 8px 8px; border-bottom:2px solid var(--line); font-size:13px; }
  .caphead { padding:8px 4px; }
  .caphead .capname { font-weight:650; letter-spacing:-.01em; }
  .cell { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:8px; min-height:54px; box-shadow:var(--shadow); }
  .cell.empty { border-style:dashed; box-shadow:none; color:var(--faint); display:flex; align-items:center; justify-content:center; }

  /* ---------- cards ---------- */
  .card { background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--line); border-radius:10px;
    padding:9px 11px; margin:6px 0; cursor:pointer; box-shadow:var(--shadow); transition:transform .12s, box-shadow .12s, border-color .12s; }
  .card:hover { border-color:var(--accent); box-shadow:var(--shadow-lift); transform:translateY(-1px); }
  .card .name { font-weight:650; letter-spacing:-.01em; }
  .card.child { margin-left:16px; }
  .card.absent { border-style:dashed; box-shadow:none; opacity:.9; cursor:default; }
  .card.absent:hover { transform:none; border-color:var(--line); box-shadow:none; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .chip { font-size:11px; padding:1px 8px; border-radius:999px; border:1px solid var(--line); color:var(--muted); background:var(--panel2); }

  /* status + relation + confidence */
  .badge { font-size:11px; padding:1px 8px; border-radius:6px; font-weight:600; }
  .b-active{ background:color-mix(in srgb,var(--green) 15%,transparent); color:var(--green); }
  .b-preview,.b-beta{ background:color-mix(in srgb,var(--amber) 16%,transparent); color:var(--amber); }
  .b-deprecated,.b-sunset,.b-merged,.b-renamed{ background:color-mix(in srgb,var(--red) 14%,transparent); color:var(--red); }
  .b-absent{ background:color-mix(in srgb,var(--grey) 18%,transparent); color:var(--grey); }
  .rel { font-size:11px; padding:1px 7px; border-radius:6px; border:1px solid var(--line); }
  .rel-direct{ color:var(--green); } .rel-partial{ color:var(--blue); } .rel-broader{ color:var(--purple); } .rel-none{ color:var(--grey); }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; vertical-align:middle; margin-right:4px; }
  .c-high{ background:var(--green); } .c-medium{ background:var(--amber); } .c-low{ background:var(--red); }
  .stale{ color:var(--amber); } .flux{ color:var(--purple); }
  .pill-kind { font-size:11px; padding:1px 7px; border-radius:6px; background:var(--panel2); border:1px solid var(--line); color:var(--muted); }
  .note { color:var(--muted); font-size:12.5px; margin-top:6px; }
  .crosshome { font-size:11px; color:var(--amber); margin-top:4px; }
  .parentlink { font-size:11px; color:var(--muted); margin-top:4px; }

  /* ---------- tables ---------- */
  .tablewrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; margin-top:10px; }
  th,td { text-align:left; padding:8px 9px; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--muted); font-weight:550; font-size:12px; }
  tr.clickable:hover { background:var(--panel2); cursor:pointer; }

  /* ---------- lineage / flow ---------- */
  .lineage { display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:8px 10px; margin:8px 0; box-shadow:var(--shadow); }
  .arrow { color:var(--faint); }
  .node { background:var(--panel2); border:1px solid var(--line); border-radius:7px; padding:4px 9px; cursor:pointer; }
  .node:hover { border-color:var(--accent); }

  /* ---------- how-it-works ---------- */
  .about { max-width:1000px; }
  .about .lead { font-size:15.5px; color:var(--ink); margin:6px 0 16px; line-height:1.6; }
  .about h3 { margin:22px 0 8px; font-size:12.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  .flow { display:flex; align-items:stretch; gap:8px; flex-wrap:wrap; }
  .flow .arrow { align-self:center; }
  .stage { flex:1 1 0; min-width:165px; background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:11px 12px; box-shadow:var(--shadow); }
  .stage-h { font-weight:680; margin-bottom:4px; color:var(--ink); }
  .gategrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; }

  /* ---------- drawer ---------- */
  #drawer { position:fixed; top:0; right:0; height:100%; width:min(460px,92vw); background:var(--panel);
    border-left:1px solid var(--line); box-shadow:var(--shadow-lift); transform:translateX(100%); transition:transform .2s; overflow:auto; z-index:20; padding:18px; }
  #drawer.open { transform:none; }
  #drawer h2 { margin:0 0 2px; font-size:19px; letter-spacing:-.02em; }
  #drawer .close { float:right; cursor:pointer; color:var(--muted); font-size:22px; line-height:1; }
  .kv { display:grid; grid-template-columns:120px 1fr; gap:5px 10px; margin:12px 0; font-size:13px; }
  .kv .k { color:var(--muted); }
  .timeline { border-left:2px solid var(--line); margin:8px 0; padding-left:12px; }
  .ev { margin:8px 0; } .ev .d { color:var(--muted); font-size:12px; } .ev.future .d { color:var(--amber); }
  .overlay { position:fixed; inset:0; background:rgba(10,12,20,.42); backdrop-filter:blur(1px); z-index:15; display:none; } .overlay.open{ display:block; }

  /* ---------- overview: hero + coverage ---------- */
  .hero { margin:-22px -22px 22px; padding:30px 22px 30px; background:linear-gradient(180deg,var(--accent-soft),transparent); border-bottom:1px solid var(--line); }
  .hero h1 { font-size:34px; line-height:1.1; letter-spacing:-.03em; margin:0 0 12px; max-width:20ch; }
  .hero-sub { font-size:16px; color:var(--muted); max-width:64ch; margin:0 0 18px; line-height:1.55; }
  .hero-cta { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  .btn { font:inherit; font-size:14px; padding:10px 16px; border-radius:10px; border:1px solid var(--line); background:var(--panel); color:var(--ink); cursor:pointer; font-weight:600; transition:.15s; box-shadow:var(--shadow); }
  .btn:hover { border-color:var(--accent); transform:translateY(-1px); box-shadow:var(--shadow-lift); }
  .btn-primary { background:var(--accent); color:var(--accent-ink); border-color:var(--accent); }
  .btn-primary:hover { filter:brightness(1.06); }
  .hero-stats { font-size:14px; color:var(--muted); }
  .hero-stats b { color:var(--ink); }
  .cov-head { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:2px; }
  .legend { display:flex; gap:14px; font-size:12px; color:var(--muted); }
  .legend i { font-style:normal; }
  .pdot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; vertical-align:middle; }
  .covwrap { overflow-x:auto; margin-top:10px; }
  .cov { display:grid; gap:12px; min-width:760px; align-items:start; }
  .cov-caph { padding:4px 2px; }
  .cov-caph .capname { font-weight:650; letter-spacing:-.01em; }
  .cov-cell { display:flex; flex-wrap:wrap; gap:6px; align-content:flex-start; padding-top:2px; }
  .cov-pill { display:inline-flex; align-items:center; gap:6px; font-size:12px; padding:4px 9px; border-radius:999px; border:1px solid var(--line); background:var(--panel); cursor:pointer; box-shadow:var(--shadow); transition:transform .12s,border-color .12s,box-shadow .12s; }
  .cov-pill:hover { border-color:var(--accent); transform:translateY(-1px); box-shadow:var(--shadow-lift); }
  .cov-pill.absent { border-style:dashed; color:var(--faint); cursor:default; background:none; box-shadow:none; }

  /* ---------- explore toolbar ---------- */
  .toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:0 0 8px; }
  .search { flex:1 1 300px; min-width:200px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 13px; color:var(--ink); font:inherit; box-shadow:var(--shadow); }
  .search:focus, select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .empty-state { padding:48px 20px; text-align:center; color:var(--muted); border:1px dashed var(--line); border-radius:12px; margin-top:10px; }

  /* ---------- responsive ---------- */
  @media (max-width:820px){
    header { padding:12px 14px 0; }
    main { padding:18px 14px 80px; }
    .tagline { font-size:12.5px; }
    table { font-size:12.5px; }
    .hero { margin:-18px -14px 18px; padding:22px 14px; }
    .hero h1 { font-size:26px; }
    .hero-sub { font-size:14.5px; }
  }
</style>
</head>

<header>
  <div class="bar">
    <div class="brand"><span class="mark">&#9670;</span>AI Provider Taxonomy <small id="asof"></small></div>
    <div class="bar-right">
      <span id="validpill"></span>
      <button id="themeBtn" class="iconbtn" onclick="toggleTheme()" title="Toggle light / dark">&#9790;</button>
    </div>
  </div>
  <div class="tagline">A self-maintaining map of what Anthropic, OpenAI &amp; Google ship across every AI capability — each offering discovered from the live web, grounded to its source, and gated before it ships. <a onclick="showAbout(event)">How it works &rarr;</a></div>
  <div id="banner"></div>
  <nav id="nav"></nav>
</header>
<main id="main"></main>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<aside id="drawer"></aside>

<script>
/* ---------- theme (light default; persisted) ---------- */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('themeBtn');
  if (btn) btn.innerHTML = t==='dark' ? '&#9728;' : '&#9790;';   // sun in dark, moon in light
  try { localStorage.setItem('taxo-theme', t); }
  catch (e) { /* localStorage blocked (e.g. some file:// origins) — theme just won't persist */ }
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  applyTheme(cur==='dark' ? 'light' : 'dark');
}
(function(){
  let t = 'light';
  try { t = localStorage.getItem('taxo-theme') || 'light'; }
  catch (e) { /* localStorage blocked — default to light */ }
  applyTheme(t);
})();

  }
  const cross = (p.primary_capability_id && cap && p.primary_capability_id!==cap)
    ? `<div class="crosshome">primary home: ${esc(capById[p.primary_capability_id]?.name||p.primary_capability_id)}</div>` : '';
  const parentLink = (opts.showParent && p.parent_id && prodById[p.parent_id])
    ? `<div class="parentlink">feature of: ${esc(prodById[p.parent_id].name)}</div>` : '';
  return `<div class="card ${opts.child?'child':''}" style="border-left-color:${provVar(p.provider)}" onclick="openDrawer('${p.id}')">
    <div class="row"><span class="name">${esc(p.name)}</span> ${confDot(p)}${statusBadge(p)}${relTag(p)}</div>
    <div class="chips"><span class="pill-kind">${p.kind}</span>${surfaces(p)}</div>
    <div class="row small">${staleFlag(p)} ${fluxFlag(p)}</div>
    ${cross}${parentLink}
  </div>`;
}

/* render a provider's offerings within a capability, nesting children that share the cell.
   `only` (optional Set of ids) filters to matching offerings — used by Explore. */
function cell(cap, provider, only){
  let items = (byCap[cap]||[]).filter(p=>p.provider===provider);
  if (only) items = items.filter(p=>only.has(p.id));
  if (!items.length) return `<div class="cell empty">&mdash;</div>`;
  const ids = new Set(items.map(p=>p.id));
  const tops = items.filter(p => !(p.parent_id && ids.has(p.parent_id)));
  let html = '';
  for (const p of tops){
    html += card(p, cap, {showParent:true});
    for (const ch of items.filter(c=>c.parent_id===p.id)) html += card(ch, cap, {child:true});
  }
  return `<div class="cell">${html}</div>`;
}

/* ---------- views (each returns an HTML string; selectView injects it) ---------- */
/* ---------- Explore: search · filter · compare ---------- */
const exploreState = { q:'', provider:'', capability:'', status:'' };
function exActive(){ const s=exploreState; return !!(s.q||s.provider||s.capability||s.status); }
function exMatch(p){
  const s = exploreState;
  if (s.provider && p.provider!==s.provider) return false;
  if (s.capability && !(p.capability_ids||[]).includes(s.capability)) return false;
  if (s.status && p.status!==s.status) return false;
  if (s.q){
    const hay = `${p.name} ${p.provider} ${(p.surfaces||[]).join(' ')} ${p.kind} ${(p.capability_ids||[]).map(c=>capById[c]?.name||c).join(' ')} ${p.scope_note||''}`.toLowerCase();
    if (!hay.includes(s.q)) return false;
  }
  return true;
}
function exploreResultsHtml(){
  const provs = exploreState.provider ? [exploreState.provider] : providers;
  const matches = prods.filter(exMatch);
  const matchIds = new Set(matches.map(p=>p.id));
  const capList = caps.filter(c => c.id!=='unclassified'
    && (!exploreState.capability || c.id===exploreState.capability)
    && (byCap[c.id]||[]).some(p=>matchIds.has(p.id)));
  if (!matches.length)
    return `<div class="empty-state">No offerings match these filters.<br><a onclick="clearExplore()">Clear filters</a></div>`;
  const compare = capList.length===1;
  const cols = `200px ${provs.map(()=>'1fr').join(' ')}`;
  let html = `<div class="muted small" style="margin:6px 0 2px">${matches.length} offering${matches.length===1?'':'s'} · ${capList.length} capabilit${capList.length===1?'y':'ies'}`
    + (compare ? ` · comparing providers side by side` : '')
    + (exActive() ? ` · <a onclick="clearExplore()">clear filters</a>` : '') + `</div>`;
  html += `<div class="pivotwrap"><div class="pivot" style="grid-template-columns:${cols}">`;
  html += `<div class="colhead">capability</div>` +
    provs.map(p=>`<div class="colhead" style="border-bottom-color:${provVar(p)}">${esc(p)}</div>`).join('');
  for (const c of capList){
    html += `<div class="caphead"><div class="capname">${esc(c.name)}</div><div class="muted small">${esc(c.description)}</div></div>`;
    html += provs.map(pr=>cell(c.id, pr, matchIds)).join('');
  }
  html += `</div></div>`;
  return html;
}
function updateExplore(){
  exploreState.q = (document.getElementById('exq').value||'').trim().toLowerCase();
  exploreState.provider = document.getElementById('exprov').value;
  exploreState.capability = document.getElementById('excap').value;
  exploreState.status = document.getElementById('exstat').value;
  document.getElementById('explore-results').innerHTML = exploreResultsHtml();   // toolbar untouched → input keeps focus
}
function clearExplore(){ exploreState.q=''; exploreState.provider=''; exploreState.capability=''; exploreState.status=''; selectView('Explore'); }
function viewExplore(){
  const s = exploreState;
  const opt = (v,label,cur)=>`<option value="${esc(v)}"${v===cur?' selected':''}>${esc(label)}</option>`;
  const provOpts = `<option value="">All providers</option>` + providers.map(p=>opt(p,p,s.provider)).join('');
  const capOpts = `<option value="">All capabilities</option>` + caps.filter(c=>c.id!=='unclassified').map(c=>opt(c.id,c.name,s.capability)).join('');
  const statOpts = `<option value="">Any status</option>` + ['active','preview','beta','deprecated','sunset','merged','renamed','absent'].map(st=>opt(st,st,s.status)).join('');
  return `<div class="section-intro">Search and filter the full catalog. Pick a single capability to compare providers side by side; click any offering for its cross-provider rivals.</div>
  <div class="toolbar">
    <input id="exq" class="search" type="search" placeholder="Search products, surfaces, capabilities…" value="${esc(s.q)}" oninput="updateExplore()">
    <select id="exprov" onchange="updateExplore()">${provOpts}</select>
    <select id="excap" onchange="updateExplore()">${capOpts}</select>
    <select id="exstat" onchange="updateExplore()">${statOpts}</select>
  </div>
  <div id="explore-results">${exploreResultsHtml()}</div>`;
}

function viewLineage(){
  const chains = prods.filter(p=>p.successor_id).map(p=>{
    const seq=[p]; let cur=p; const seen=new Set([p.id]);
    while(cur.successor_id && prodById[cur.successor_id] && !seen.has(cur.successor_id)){ cur=prodById[cur.successor_id]; seq.push(cur); seen.add(cur.id);} return seq;
  });
  let html = `<h3>Rename / sunset / merge lineage</h3><div class="muted small">Old names still resolve to their successor.</div>`;
  if (!chains.length) html += `<p class="faint small">No rename/merge chains in the current catalog.</p>`;
  for (const seq of chains){
    html += `<div class="lineage">` + seq.map((p,i)=>`${i?'<span class="arrow">&rarr;</span>':''}<span class="node" onclick="openDrawer('${p.id}')">${esc(p.name)} ${statusBadge(p)}</span>`).join('') + `</div>`;
  }
  const flux = prods.filter(isFlux);
  html += `<h3 style="margin-top:18px">In flux <span class="faint small">${flux.length}</span></h3>`;
  html += `<div class="tablewrap"><table><tr><th>product</th><th>provider</th><th>status</th><th>why</th></tr>` +
    flux.map(p=>{ const why = FLUX_STATUS.has(p.status)?`status ${p.status}`:((p.lifecycle||[]).find(e=>e.date>today)?`future event ${(p.lifecycle.find(e=>e.date>today)).date}`:`event ${(p.lifecycle.find(e=>FLUX_EVENTS.has(e.event))||{}).event}`);
      return `<tr class="clickable" onclick="openDrawer('${p.id}')"><td>${esc(p.name)}</td><td>${esc(p.provider)}</td><td>${statusBadge(p)}</td><td class="muted small">${esc(why)}</td></tr>`; }).join('') + `</table></div>`;
  return html;
}

function viewStaleness(){
  const rows = prods.map(p=>({p, o:stale[p.id]})).filter(r=>r.o!=null).sort((a,b)=>b.o-a.o);
  let html = `<h3>Re-verify soonest first</h3><div class="muted small">Re-verify intervals by confidence: high ${APP.intervals.high}d &middot; medium ${APP.intervals.medium}d &middot; low ${APP.intervals.low}d. "today" = ${today}.</div>`;
  html += `<div class="tablewrap"><table><tr><th>overdue</th><th>product</th><th>provider</th><th>confidence</th><th>last verified</th></tr>` +
    rows.map(({p,o})=>`<tr class="clickable" onclick="openDrawer('${p.id}')">
      <td class="${o>0?'stale':'faint'}">${o>0?('+'+o+'d'):o+'d'}</td>
      <td>${esc(p.name)}</td><td>${esc(p.provider)}</td>
      <td>${confDot(p)}${(p.source||{}).confidence||''}</td>
      <td class="muted small">${esc((p.source||{}).last_verified)}</td></tr>`).join('') + `</table></div>`;
  return html;
}

function viewIntake(){
  const order = ['candidate','needs_review','rejected'];
  const groups = {}; prods.forEach(p=>{ const r=p.review_status; if(order.includes(r)) (groups[r] ||= []).push(p); });
  let html = `<h3>Discovery intake</h3><div class="muted small">Discovery lands items here. Triage assigns a capability, sets the scope relation, and promotes to confirmed once the trust gates pass.</div>`;
  if (!Object.keys(groups).length) html += `<p class="faint small">No items awaiting review.</p>`;
  for (const r of order){
    if (!groups[r]) continue;
    html += `<div class="muted small" style="margin-top:12px">${r.replace('_',' ')} <span class="faint">${groups[r].length}</span></div>`;
    html += `<div class="tablewrap"><table><tr><th>product</th><th>provider</th><th>primary capability</th><th>confidence</th><th>source</th></tr>` +
      groups[r].map(p=>`<tr class="clickable" onclick="openDrawer('${p.id}')"><td>${esc(p.name)}</td><td>${esc(p.provider)}</td>
        <td>${esc(capById[p.primary_capability_id]?.name||p.primary_capability_id)}</td>
        <td>${confDot(p)}${(p.source||{}).confidence||''}</td>
        <td><a href="${esc((p.source||{}).url)}" target="_blank" rel="noopener">link</a></td></tr>`).join('') + `</table></div>`;
  }
  return html;
}

function metricsHtml(){
  return `<div class="metrics">` + [
    ['schema conformance', M.schema_conformance.toFixed(2)],
    ['provenance', M.provenance_completeness.toFixed(2)],
    ['fresh (staleness)', M.staleness_coverage.toFixed(2)],
    ['stale', M.stale_count],
    ['review', Object.entries(M.review_status).map(([k,v])=>`${k}:${v}`).join(' ')],
  ].map(([k,v])=>`<span>${k} <b>${esc(v)}</b></span>`).join('') + `</div>`;
}

/* "Under the hood" — operator/trust views consolidated, reframed as proof of rigor */
function viewUnderHood(){
  return `<div class="section-intro">How the catalog keeps itself honest. The same trust machinery described in <a onclick="showAbout(event)">How it works</a>, shown live — quantitative metrics, the re-verify queue, the discovery intake, and lifecycle changes.</div>`
    + `<h3>Trust metrics</h3>` + metricsHtml()
    + `<div style="margin-top:18px">` + viewStaleness() + `</div>`
    + `<div style="margin-top:22px">` + viewIntake() + `</div>`
    + `<div style="margin-top:22px">` + viewLineage() + `</div>`;
}

/* ---------- Overview: hero + signature coverage matrix ---------- */
function statusColor(s){
  if (s==='active') return 'var(--green)';
  if (s==='preview'||s==='beta') return 'var(--amber)';
  if (s==='absent') return 'var(--grey)';
  return 'var(--red)';   // sunset / deprecated / merged / renamed
}
function covPill(p){
  if (p.status==='absent')
    return `<span class="cov-pill absent" title="no first-party offering">&#9711; none</span>`;
  return `<span class="cov-pill" style="border-left:3px solid ${provVar(p.provider)}" onclick="openDrawer('${p.id}')" title="${esc(p.name)} — ${esc(p.status)}"><span class="pdot" style="background:${statusColor(p.status)}"></span>${esc(p.name)}</span>`;
}
function covCell(cap, provider){
  const items = (byCap[cap]||[]).filter(p=>p.provider===provider);
  if (!items.length) return `<div class="cov-cell"><span class="faint small">&mdash;</span></div>`;
  const ids = new Set(items.map(p=>p.id));
  const tops = items.filter(p => !(p.parent_id && ids.has(p.parent_id)));   // children show in the drawer
  return `<div class="cov-cell">${tops.map(covPill).join('')}</div>`;
}
function viewOverview(){
  const offerings = prods.filter(p=>p.status!=='absent').length;
  const capCount = caps.filter(c=>c.id!=='unclassified').length;
  const grounded = Math.round((M.provenance_completeness||0)*100);
  const tiers = [...new Set(caps.map(c=>c.tier))];
  const cols = `210px ${providers.map(()=>'1fr').join(' ')}`;
  let cov = `<div class="covwrap"><div class="cov" style="grid-template-columns:${cols}">`;
  cov += `<div class="colhead">capability</div>` +
    providers.map(p=>`<div class="colhead" style="border-bottom-color:${provVar(p)}">${esc(p)}</div>`).join('');
  for (const tier of tiers){
    for (const c of caps.filter(x=>x.tier===tier && x.id!=='unclassified')){
      cov += `<div class="cov-caph"><div class="capname">${esc(c.name)}</div><div class="faint small">${esc(c.tier)}</div></div>`;
      cov += providers.map(pr=>covCell(c.id, pr)).join('');
    }
  }
  cov += `</div></div>`;
  return `
  <section class="hero">
    <h1>The AI provider landscape, kept honest.</h1>
    <p class="hero-sub">A self-maintaining map of what Anthropic, OpenAI &amp; Google ship across every AI capability — discovered from the live web, grounded to its source, and gated before it ships.</p>
    <div class="hero-cta">
      <button class="btn btn-primary" onclick="selectView('Explore')">Explore the catalog &rarr;</button>
      <button class="btn" onclick="showAbout()">How it works</button>
    </div>
    <div class="hero-stats"><b>${offerings}</b> offerings &middot; <b>${capCount}</b> capabilities &middot; <b>${providers.length}</b> providers &middot; <b>${grounded}%</b> source-grounded</div>
  </section>
  <div class="cov-head">
    <h3 style="margin:0">Coverage at a glance</h3>
    <div class="legend">
      <i><span class="pdot" style="background:var(--green)"></span>active</i>
      <i><span class="pdot" style="background:var(--amber)"></span>preview</i>
      <i><span class="pdot" style="background:var(--red)"></span>sunset</i>
      <i><span class="pdot" style="background:var(--grey)"></span>none</i>
    </div>
  </div>
  <div class="muted small" style="margin:2px 0 4px">Each pill is a shipping offering, coloured by lifecycle status. Click any to see it and its cross-provider rivals.</div>
  ${cov}`;
}

function viewAbout(){
  const stages = [
    ['1 · Discover','Sweep the live web (Tavily) per capability for offerings the catalog is missing.'],
    ['2 · Ground','An independent judge must find the claim quoted verbatim on its source page — no training-knowledge guesses.'],
    ['3 · Triangulate','Re-check existence and lifecycle status against a second, independent source. Disagreement is flagged, not silently resolved.'],
    ['4 · Classify','Map each offering to a capability axis; fold access surfaces (an "X SDK / CLI") into their parent instead of inventing a node.'],
    ['5 · Audit &amp; Gate','Red-team the whole catalog and block deploy on any schema break, eval failure, or critical finding.'],
  ];
  const gates = [
    ['Schema gate','Every record must conform to the JSON Schema or it is rejected outright.'],
    ['Grounding gate','The supporting quote must actually appear on the cited page.'],
    ['Classification gate','Independent classification samples must agree before a mapping is trusted.'],
    ['Deploy gate','Ships only if evals pass and there are zero critical audit findings.'],
  ];
  return `<div class="about">
    <p class="lead">This catalog maintains itself. Offerings are discovered from the live web, every claim is grounded against its source and cross-checked against an independent second source, and nothing ships unless it clears a deploy gate. The other tabs show the <em>output</em> of that pipeline — every product here cleared it.</p>
    <h3>The pipeline</h3>
    <div class="flow">` +
      stages.map((s,i)=>`${i?'<span class="arrow">&rarr;</span>':''}<div class="stage"><div class="stage-h">${s[0]}</div><div class="muted small">${s[1]}</div></div>`).join('') +
    `</div>
    <h3>Trust gates</h3>
    <div class="gategrid">` +
      gates.map(g=>`<div class="stage"><div class="stage-h">${g[0]}</div><div class="muted small">${g[1]}</div></div>`).join('') +
    `</div>
    <h3>By the numbers</h3>
    <div class="metrics">
      <span><b>${caps.length}</b> capabilities</span>
      <span><b>${prods.length}</b> products</span>
      <span><b>${providers.length}</b> providers</span>
      <span>schema conformance <b>${M.schema_conformance.toFixed(2)}</b></span>
      <span>provenance <b>${M.provenance_completeness.toFixed(2)}</b></span>
    </div>
    <p class="muted small" style="margin-top:16px">Python engine on Vertex AI Claude · single-file zero-dependency viewer · grounded, evaluated against gold-set + adversarial suites, and gated before every deploy.</p>
  </div>`;
}

/* ---------- drawer ---------- */
function openDrawer(id){
  const p = prodById[id]; if(!p) return;
  const dr = document.getElementById('drawer');
  const equivalents = (byCap[p.primary_capability_id]||[]).filter(q=>q.id!==p.id && q.provider!==p.provider);
  const pred = p.predecessor_id && prodById[p.predecessor_id], succ = p.successor_id && prodById[p.successor_id];
  const lifecycle = (p.lifecycle||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  dr.innerHTML = `
    <span class="close" onclick="closeDrawer()">&times;</span>
    <h2>${esc(p.name)}</h2>
    <div class="row">${confDot(p)}${statusBadge(p)}${relTag(p)} <span class="pill-kind">${p.kind}</span> ${staleFlag(p)} ${fluxFlag(p)}</div>
    <div class="kv">
      <span class="k">provider</span><span>${esc(p.provider)}</span>
      <span class="k">primary</span><span>${esc(capById[p.primary_capability_id]?.name||p.primary_capability_id)}</span>
      <span class="k">capabilities</span><span>${(p.capability_ids||[]).map(c=>esc(capById[c]?.name||c)).join(', ')}</span>
      <span class="k">surfaces</span><span>${(p.surfaces||[]).join(', ')||'&mdash;'}</span>
      <span class="k">review</span><span>${esc(p.review_status||'confirmed')}</span>
      ${p.parent_id?`<span class="k">parent</span><span><a onclick="openDrawer('${p.parent_id}')">${esc(prodById[p.parent_id]?.name||p.parent_id)}</a></span>`:''}
      <span class="k">source</span><span><a href="${esc((p.source||{}).url)}" target="_blank" rel="noopener">${esc((p.source||{}).url)}</a><br><span class="faint small">verified ${esc((p.source||{}).last_verified)} &middot; ${esc((p.source||{}).confidence)} confidence</span></span>
    </div>
    ${p.scope_note?`<div class="note">${esc(p.scope_note)}</div>`:''}
    ${(pred||succ)?`<h3 class="small muted" style="margin-top:14px">lineage</h3><div class="lineage">
        ${pred?`<span class="node" onclick="openDrawer('${pred.id}')">${esc(pred.name)}</span><span class="arrow">&rarr;</span>`:''}
        <span class="node" style="border-color:var(--accent)">${esc(p.name)}</span>
        ${succ?`<span class="arrow">&rarr;</span><span class="node" onclick="openDrawer('${succ.id}')">${esc(succ.name)}</span>`:''}</div>`:''}
    ${lifecycle.length?`<h3 class="small muted" style="margin-top:14px">history</h3><div class="timeline">${lifecycle.map(e=>`
        <div class="ev ${e.date>today?'future':''}"><div class="d">${esc(e.date)} &middot; ${esc(e.event)}${e.date>today?' (scheduled)':''}</div>
        <div>${esc(e.note)} ${e.source_url?`<a href="${esc(e.source_url)}" target="_blank" rel="noopener">src</a>`:''}</div></div>`).join('')}</div>`:''}
    ${equivalents.length?`<h3 class="small muted" style="margin-top:14px">cross-provider equivalents (${esc(capById[p.primary_capability_id]?.name)})</h3>
        ${equivalents.map(q=>`<div class="card" style="border-left-color:${provVar(q.provider)}" onclick="openDrawer('${q.id}')"><div class="row"><span class="name">${esc(q.name)}</span> <span class="pill-kind">${esc(q.provider)}</span>${statusBadge(q)}${relTag(q)}</div></div>`).join('')}`:''}
  `;
  dr.classList.add('open'); document.getElementById('overlay').classList.add('open');
}
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

/* ---------- nav: four intent-driven sections ---------- */
const VIEWS = [['Overview',viewOverview],['Explore',viewExplore],['How it works',viewAbout],['Under the hood',viewUnderHood]];
const nav = document.getElementById('nav');
const navButtons = {};
VIEWS.forEach(([label,fn])=>{ const btn=document.createElement('button'); btn.textContent=label;
  btn.onclick=()=>selectView(label); navButtons[label]=[btn,fn]; nav.appendChild(btn); });
function selectView(label){
  Object.values(navButtons).forEach(([b])=>b.classList.remove('active'));
  const [btn,fn]=navButtons[label]; btn.classList.add('active');
  main.innerHTML = fn();
  window.scrollTo({top:0, behavior:'smooth'});
}
function showAbout(e){ if(e) e.preventDefault(); selectView('How it works'); }
const main = document.getElementById('main');
selectView('Overview');
</script>
