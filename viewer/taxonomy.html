<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Provider Taxonomy</title>
<style>
  :root {
    --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --line:#2a2f3a;
    --ink:#e7e9ee; --muted:#9aa3b2; --faint:#6b7280;
    --green:#3fb950; --amber:#d29922; --red:#f85149; --blue:#58a6ff; --purple:#bc8cff; --grey:#7d8590;
    --anthropic:#d9a066; --openai:#10a37f; --google:#4f86ff;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  a { color:var(--blue); text-decoration:none; } a:hover { text-decoration:underline; }
  header { padding:14px 20px; border-bottom:1px solid var(--line); background:var(--panel); position:sticky; top:0; z-index:5; }
  .title { font-size:18px; font-weight:650; } .title small { color:var(--muted); font-weight:400; margin-left:8px; }
  .banner { margin-top:10px; padding:8px 12px; border-radius:8px; font-size:13px; }
  .banner.ok { background:rgba(63,185,80,.12); border:1px solid rgba(63,185,80,.4); }
  .banner.bad { background:rgba(248,81,73,.12); border:1px solid rgba(248,81,73,.4); }
  .banner ul { margin:6px 0 0; padding-left:18px; } .banner code { color:var(--muted); }
  .metrics { display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; font-size:12px; color:var(--muted); }
  .metrics b { color:var(--ink); }
  nav { display:flex; gap:4px; padding:8px 16px 0; background:var(--panel); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:4;}
  nav button { background:none; border:none; color:var(--muted); padding:8px 14px; cursor:pointer; border-bottom:2px solid transparent; font-size:13px; }
  nav button.active { color:var(--ink); border-bottom-color:var(--blue); }
  main { padding:18px 20px 80px; max-width:1500px; margin:0 auto; }
  .row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  select { background:var(--panel2); color:var(--ink); border:1px solid var(--line); border-radius:6px; padding:6px 8px; }
  .muted { color:var(--muted); } .faint { color:var(--faint); } .small { font-size:12px; }

  /* pivot grid */
  .pivot { display:grid; gap:12px; margin-top:14px; }
  .colhead { font-weight:600; padding:6px 8px; border-bottom:1px solid var(--line); position:sticky; top:96px; background:var(--bg); }
  .cell { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:8px; min-height:54px; }
  .cell.empty { border-style:dashed; color:var(--faint); display:flex; align-items:center; justify-content:center; }

  .card { background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:8px 10px; margin:6px 0; cursor:pointer; }
  .card:hover { border-color:var(--blue); }
  .card .name { font-weight:600; }
  .card.child { margin-left:16px; border-left:2px solid var(--line); }
  .card.absent { border-style:dashed; opacity:.85; cursor:default; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:5px; }
  .chip { font-size:11px; padding:1px 7px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }
  .badge { font-size:11px; padding:1px 7px; border-radius:6px; font-weight:600; }
  .b-active{background:rgba(63,185,80,.16);color:var(--green);} .b-preview,.b-beta{background:rgba(210,153,34,.16);color:var(--amber);}
  .b-deprecated,.b-sunset,.b-merged,.b-renamed{background:rgba(248,81,73,.14);color:var(--red);}
  .b-absent{background:rgba(125,133,144,.16);color:var(--grey);}
  .rel{font-size:11px;padding:1px 7px;border-radius:6px;border:1px solid var(--line);}
  .rel-direct{color:var(--green);} .rel-partial{color:var(--blue);} .rel-broader{color:var(--purple);} .rel-none{color:var(--grey);}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:4px;}
  .c-high{background:var(--green);} .c-medium{background:var(--amber);} .c-low{background:var(--red);}
  .stale{color:var(--amber);} .flux{color:var(--purple);}
  .pill{font-size:11px;padding:1px 7px;border-radius:6px;background:var(--panel);border:1px solid var(--line);color:var(--muted);}
  .note { color:var(--muted); font-size:12px; margin-top:5px; }
  .crosshome{font-size:11px;color:var(--amber);margin-top:4px;}
  .parentlink{font-size:11px;color:var(--muted);margin-top:4px;}

  table { width:100%; border-collapse:collapse; margin-top:10px; }
  th,td { text-align:left; padding:7px 8px; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--muted); font-weight:500; font-size:12px; }
  tr.clickable:hover { background:var(--panel); cursor:pointer; }

  .lineage { display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:8px 10px; margin:8px 0; }
  .arrow { color:var(--muted); }
  .node { background:var(--panel2); border:1px solid var(--line); border-radius:6px; padding:3px 8px; cursor:pointer; }

  /* drawer */
  #drawer { position:fixed; top:0; right:0; height:100%; width:min(460px,92vw); background:var(--panel); border-left:1px solid var(--line); transform:translateX(100%); transition:transform .18s; overflow:auto; z-index:20; padding:18px; }
  #drawer.open { transform:none; }
  #drawer h2 { margin:0 0 2px; font-size:18px; }
  #drawer .close { float:right; cursor:pointer; color:var(--muted); font-size:20px; }
  .kv { display:grid; grid-template-columns:120px 1fr; gap:4px 10px; margin:12px 0; font-size:13px; }
  .kv .k { color:var(--muted); }
  .timeline { border-left:2px solid var(--line); margin:8px 0; padding-left:12px; }
  .ev { margin:8px 0; } .ev .d { color:var(--muted); font-size:12px; } .ev.future .d { color:var(--amber); }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:15; display:none; } .overlay.open{display:block;}

  /* hero tagline + how-it-works */
  .tagline { margin-top:6px; color:var(--muted); font-size:13px; max-width:920px; }
  .tagline a { white-space:nowrap; }
  .about { max-width:980px; }
  .about .lead { font-size:15px; color:var(--ink); margin:6px 0 16px; line-height:1.6; }
  .about h3 { margin:20px 0 8px; font-size:14px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  .flow { display:flex; align-items:stretch; gap:8px; flex-wrap:wrap; }
  .flow .arrow { align-self:center; color:var(--faint); }
  .stage { flex:1 1 0; min-width:160px; background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:10px 11px; }
  .stage-h { font-weight:650; margin-bottom:4px; color:var(--ink); }
  .gategrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; }
</style>
</head>
<body>
<header>
  <div class="title">AI Provider Taxonomy <small id="asof"></small></div>
  <div class="tagline">A self-maintaining map of what Anthropic, OpenAI &amp; Google ship across every AI capability — each offering discovered from the live web, grounded to its source, and gated before it ships. <a href="#" onclick="showAbout(event)">How it works &rarr;</a></div>
  <div id="banner"></div>
  <div class="metrics" id="metrics"></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<aside id="drawer"></aside>

const D = APP.data, today = APP.today, stale = APP.staleness, V = APP.validation, M = APP.metrics;
const caps = D.capabilities, prods = D.products;
const capById = Object.fromEntries(caps.map(c=>[c.id,c]));

const FLUX_EVENTS = new Set(["consolidation_announced","scope_expanded","related_deprecation","deprecated","discontinued"]);

else { b.className='banner bad'; b.innerHTML = `&#10007; ${V.issues.length} validation issue(s)<ul>` +

/* ---------- helpers ---------- */
function statusBadge(p){ return `<span class="badge b-${p.status}">${p.status}</span>`; }
function relTag(p){ return `<span class="rel rel-${p.relation_within_capability}">${p.relation_within_capability}</span>`; }
function confDot(p){ const c=(p.source||{}).confidence||'low'; return `<span class="dot c-${c}" title="confidence ${c}"></span>`; }
function staleFlag(p){ const o=stale[p.id]; return (o!=null&&o>0)?`<span class="stale small" title="overdue ${o}d">&#9203; stale ${o}d</span>`:''; }
function isFlux(p){
  if (FLUX_STATUS.has(p.status)) return true;
  return (p.lifecycle||[]).some(e => e.date>today || FLUX_EVENTS.has(e.event));
}
function fluxFlag(p){ return isFlux(p)?`<span class="flux small" title="in flux">&#9888; in flux</span>`:''; }
function surfaces(p){ return (p.surfaces||[]).map(s=>`<span class="chip">${s}</span>`).join(''); }

function card(p, cap, opts={}){
  if (p.status==='absent'){
    return `<div class="card absent"><div class="name muted">(none) ${statusBadge(p)}</div>
      <div class="note">${esc(p.scope_note||'No first-party offering.')} <a href="${esc((p.source||{}).url)}" target="_blank" rel="noopener">source</a></div></div>`;
  }
  const cross = (p.primary_capability_id && cap && p.primary_capability_id!==cap)
    ? `<div class="crosshome">primary home: ${esc(capById[p.primary_capability_id]?.name||p.primary_capability_id)}</div>` : '';
  const parentLink = (opts.showParent && p.parent_id && prodById[p.parent_id])
    ? `<div class="parentlink">feature of: ${esc(prodById[p.parent_id].name)}</div>` : '';
  return `<div class="card ${opts.child?'child':''}" onclick="openDrawer('${p.id}')">
    <div class="row"><span class="name">${esc(p.name)}</span> ${confDot(p)}${statusBadge(p)}${relTag(p)}</div>
    <div class="chips"><span class="chip">${p.kind}</span>${surfaces(p)}</div>
    <div class="row small">${staleFlag(p)} ${fluxFlag(p)}</div>
    ${cross}${parentLink}
  </div>`;
}

/* render a provider's offerings within a capability, nesting children that share the cell */
function cell(cap, provider){
  const items = (byCap[cap]||[]).filter(p=>p.provider===provider);
  if (!items.length) return `<div class="cell empty">&mdash;</div>`;
  const ids = new Set(items.map(p=>p.id));
  const tops = items.filter(p => !(p.parent_id && ids.has(p.parent_id)));
  let html = '';
  for (const p of tops){
    html += card(p, cap, {showParent:true});
    for (const ch of items.filter(c=>c.parent_id===p.id)) html += card(ch, cap, {child:true});
  }
  return `<div class="cell">${html}</div>`;
}

/* ---------- views ---------- */
const main = document.getElementById('main');

function viewPivot(){
  const tiers = [...new Set(caps.map(c=>c.tier))];
  let html = `<div class="muted small">Capability &times; provider. A comparison is a query: pick a capability row and read across providers. Hierarchy nests within a cell; a feature mapped to another capability appears there with a back-link.</div>`;
  const cols = `200px ${providers.map(()=>'1fr').join(' ')}`;
  html += `<div class="pivot" style="grid-template-columns:${cols}">`;
  html += `<div class="colhead">capability</div>` + providers.map(p=>`<div class="colhead">${esc(p)}</div>`).join('');
  for (const tier of tiers){
    for (const c of caps.filter(x=>x.tier===tier)){
      html += `<div class="cell" style="background:transparent;border:none">
        <div style="font-weight:600">${esc(c.name)}</div>
        <div class="faint small">${esc(c.tier)}</div>
        <div class="muted small">${esc(c.description)}</div></div>`;
      html += providers.map(pr=>cell(c.id, pr)).join('');
    }
  }
  html += `</div>`;
  main.innerHTML = html;
}

function viewProviders(){
  let html = '';
  for (const pr of providers){
    const ps = prods.filter(p=>p.provider===pr && p.status!=='absent');
    const byPrimary = {}; ps.forEach(p => (byPrimary[p.primary_capability_id] ||= []).push(p));
    html += `<h3>${esc(pr)} <span class="faint small">${ps.length} offerings</span></h3>`;
    for (const [capId, list] of Object.entries(byPrimary)){
      html += `<div class="muted small" style="margin-top:8px">${esc(capById[capId]?.name||capId)}</div>`;
      html += `<div class="row">` + list.map(p=>`<span class="node" onclick="openDrawer('${p.id}')">${esc(p.name)} ${relTag(p)}</span>`).join('') + `</div>`;
    }
  }
  main.innerHTML = html;
}

function viewLineage(){
  const chains = prods.filter(p=>p.successor_id).map(p=>{
    const seq=[p]; let cur=p; const seen=new Set([p.id]);
    while(cur.successor_id && prodById[cur.successor_id] && !seen.has(cur.successor_id)){ cur=prodById[cur.successor_id]; seq.push(cur); seen.add(cur.id);} return seq;
  });
  let html = `<h3>Rename / sunset / merge lineage</h3><div class="muted small">Old names still resolve to their successor.</div>`;
  for (const seq of chains){
    html += `<div class="lineage">` + seq.map((p,i)=>`${i?'<span class="arrow">&rarr;</span>':''}<span class="node" onclick="openDrawer('${p.id}')">${esc(p.name)} ${statusBadge(p)}</span>`).join('') + `</div>`;
  }
  const flux = prods.filter(isFlux);
  html += `<h3 style="margin-top:18px">In flux <span class="faint small">${flux.length}</span></h3>`;
  html += `<table><tr><th>product</th><th>provider</th><th>status</th><th>why</th></tr>` +
    flux.map(p=>{ const why = FLUX_STATUS.has(p.status)?`status ${p.status}`:((p.lifecycle||[]).find(e=>e.date>today)?`future event ${(p.lifecycle.find(e=>e.date>today)).date}`:`event ${(p.lifecycle.find(e=>FLUX_EVENTS.has(e.event))||{}).event}`);
      return `<tr class="clickable" onclick="openDrawer('${p.id}')"><td>${esc(p.name)}</td><td>${esc(p.provider)}</td><td>${statusBadge(p)}</td><td class="muted small">${esc(why)}</td></tr>`; }).join('') + `</table>`;
  main.innerHTML = html;
}

function viewStaleness(){
  const rows = prods.map(p=>({p, o:stale[p.id]})).filter(r=>r.o!=null).sort((a,b)=>b.o-a.o);
  let html = `<div class="muted small">Re-verify intervals by confidence: high ${APP.intervals.high}d &middot; medium ${APP.intervals.medium}d &middot; low ${APP.intervals.low}d. "today" = ${today}.</div>`;
  html += `<table><tr><th>overdue</th><th>product</th><th>provider</th><th>confidence</th><th>last verified</th></tr>` +
    rows.map(({p,o})=>`<tr class="clickable ${o>0?'':''}" onclick="openDrawer('${p.id}')">
      <td class="${o>0?'stale':'faint'}">${o>0?('+'+o+'d'):o+'d'}</td>
      <td>${esc(p.name)}</td><td>${esc(p.provider)}</td>
      <td>${confDot(p)}${(p.source||{}).confidence||''}</td>
      <td class="muted small">${esc((p.source||{}).last_verified)}</td></tr>`).join('') + `</table>`;
  html = `<h3>Re-verify soonest first</h3>` + html;
  main.innerHTML = html;

function viewIntake(){
  const order = ['candidate','needs_review','rejected'];
  const groups = {}; prods.forEach(p=>{ const r=p.review_status; if(order.includes(r)) (groups[r] ||= []).push(p); });
  let html = `<div class="muted small">Discovery lands items here. Triage assigns a capability, sets the scope relation, and promotes to confirmed once the trust gates pass.</div>`;

    if (!groups[r]) continue;
    html += `<h3>${r.replace('_',' ')} <span class="faint small">${groups[r].length}</span></h3>`;
    html += `<table><tr><th>product</th><th>provider</th><th>primary capability</th><th>confidence</th><th>source</th></tr>` +
      groups[r].map(p=>`<tr class="clickable" onclick="openDrawer('${p.id}')"><td>${esc(p.name)}</td><td>${esc(p.provider)}</td>
        <td>${esc(capById[p.primary_capability_id]?.name||p.primary_capability_id)}</td>
        <td>${confDot(p)}${(p.source||{}).confidence||''}</td>
        <td><a href="${esc((p.source||{}).url)}" target="_blank" rel="noopener">link</a></td></tr>`).join('') + `</table>`;
  }
  main.innerHTML = html;
}

function viewAbout(){
  const stages = [
    ['1 · Discover','Sweep the live web (Tavily) per capability for offerings the catalog is missing.'],
    ['2 · Ground','An independent judge must find the claim quoted verbatim on its source page — no training-knowledge guesses.'],
    ['3 · Triangulate','Re-check existence and lifecycle status against a second, independent source. Disagreement is flagged, not silently resolved.'],
    ['4 · Classify','Map each offering to a capability axis; fold access surfaces (an "X SDK / CLI") into their parent instead of inventing a node.'],
    ['5 · Audit &amp; Gate','Red-team the whole catalog and block deploy on any schema break, eval failure, or critical finding.'],
  ];
  const gates = [
    ['Schema gate','Every record must conform to the JSON Schema or it is rejected outright.'],
    ['Grounding gate','The supporting quote must actually appear on the cited page.'],
    ['Classification gate','Independent classification samples must agree before a mapping is trusted.'],
    ['Deploy gate','Ships only if evals pass and there are zero critical audit findings.'],
  ];
  main.innerHTML = `<div class="about">
    <p class="lead">This catalog maintains itself. Offerings are discovered from the live web, every claim is grounded against its source and cross-checked against an independent second source, and nothing ships unless it clears a deploy gate. The other tabs show the <em>output</em> of that pipeline — every product here cleared it.</p>
    <h3>The pipeline</h3>
    <div class="flow">` +
      stages.map((s,i)=>`${i?'<span class="arrow">&rarr;</span>':''}<div class="stage"><div class="stage-h">${s[0]}</div><div class="muted small">${s[1]}</div></div>`).join('') +
    `</div>
    <h3>Trust gates</h3>
    <div class="gategrid">` +
      gates.map(g=>`<div class="card" style="cursor:default"><div class="name">${g[0]}</div><div class="note">${g[1]}</div></div>`).join('') +
    `</div>
    <h3>By the numbers</h3>
    <div class="metrics">
      <span><b>${caps.length}</b> capabilities</span>
      <span><b>${prods.length}</b> products</span>
      <span><b>${providers.length}</b> providers</span>
      <span>schema conformance <b>${M.schema_conformance.toFixed(2)}</b></span>
      <span>provenance <b>${M.provenance_completeness.toFixed(2)}</b></span>
    </div>
    <p class="muted small" style="margin-top:16px">Python engine on Vertex AI Claude · single-file zero-dependency viewer · grounded, evaluated against gold-set + adversarial suites, and gated before every deploy.</p>
  </div>`;
}

/* ---------- drawer ---------- */
function openDrawer(id){
  const p = prodById[id]; if(!p) return;
  const dr = document.getElementById('drawer');
  const equivalents = (byCap[p.primary_capability_id]||[]).filter(q=>q.id!==p.id && q.provider!==p.provider);
  const pred = p.predecessor_id && prodById[p.predecessor_id], succ = p.successor_id && prodById[p.successor_id];
  const lifecycle = (p.lifecycle||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  dr.innerHTML = `
    <span class="close" onclick="closeDrawer()">&times;</span>
    <h2>${esc(p.name)}</h2>
    <div class="row">${confDot(p)}${statusBadge(p)}${relTag(p)} <span class="pill">${p.kind}</span> ${staleFlag(p)} ${fluxFlag(p)}</div>
    <div class="kv">
      <span class="k">provider</span><span>${esc(p.provider)}</span>
      <span class="k">primary</span><span>${esc(capById[p.primary_capability_id]?.name||p.primary_capability_id)}</span>
      <span class="k">capabilities</span><span>${(p.capability_ids||[]).map(c=>esc(capById[c]?.name||c)).join(', ')}</span>
      <span class="k">surfaces</span><span>${(p.surfaces||[]).join(', ')||'&mdash;'}</span>
      <span class="k">review</span><span>${esc(p.review_status||'confirmed')}</span>
      ${p.parent_id?`<span class="k">parent</span><span><a onclick="openDrawer('${p.parent_id}')">${esc(prodById[p.parent_id]?.name||p.parent_id)}</a></span>`:''}
      <span class="k">source</span><span><a href="${esc((p.source||{}).url)}" target="_blank" rel="noopener">${esc((p.source||{}).url)}</a><br><span class="faint small">verified ${esc((p.source||{}).last_verified)} &middot; ${esc((p.source||{}).confidence)} confidence</span></span>
    </div>
    ${p.scope_note?`<div class="note">${esc(p.scope_note)}</div>`:''}
    ${(pred||succ)?`<h3 class="small muted" style="margin-top:14px">lineage</h3><div class="lineage">
        ${pred?`<span class="node" onclick="openDrawer('${pred.id}')">${esc(pred.name)}</span><span class="arrow">&rarr;</span>`:''}
        <span class="node" style="border-color:var(--blue)">${esc(p.name)}</span>
        ${succ?`<span class="arrow">&rarr;</span><span class="node" onclick="openDrawer('${succ.id}')">${esc(succ.name)}</span>`:''}</div>`:''}
    ${lifecycle.length?`<h3 class="small muted" style="margin-top:14px">history</h3><div class="timeline">${lifecycle.map(e=>`
        <div class="ev ${e.date>today?'future':''}"><div class="d">${esc(e.date)} &middot; ${esc(e.event)}${e.date>today?' (scheduled)':''}</div>
        <div>${esc(e.note)} ${e.source_url?`<a href="${esc(e.source_url)}" target="_blank" rel="noopener">src</a>`:''}</div></div>`).join('')}</div>`:''}
    ${equivalents.length?`<h3 class="small muted" style="margin-top:14px">cross-provider equivalents (${esc(capById[p.primary_capability_id]?.name)})</h3>
        ${equivalents.map(q=>`<div class="card" onclick="openDrawer('${q.id}')"><div class="row"><span class="name">${esc(q.name)}</span> <span class="pill">${esc(q.provider)}</span>${statusBadge(q)}${relTag(q)}</div></div>`).join('')}`:''}
  `;
  dr.classList.add('open'); document.getElementById('overlay').classList.add('open');
}
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

/* ---------- nav ---------- */
const VIEWS = [['Pivot',viewPivot],['Providers',viewProviders],['Lineage & history',viewLineage],['Staleness',viewStaleness],['Intake',viewIntake],['How it works',viewAbout]];
const nav = document.getElementById('nav');
const navButtons = {};
VIEWS.forEach(([label,fn])=>{ const btn=document.createElement('button'); btn.textContent=label;
  btn.onclick=()=>selectView(label); navButtons[label]=[btn,fn]; nav.appendChild(btn); });
function selectView(label){ Object.values(navButtons).forEach(([b])=>b.classList.remove('active'));
  const [btn,fn]=navButtons[label]; btn.classList.add('active'); fn(); }
function showAbout(e){ if(e) e.preventDefault(); selectView('How it works'); window.scrollTo(0,0); }
selectView('Pivot');
</script>
</body>
</html>
