# Curated capability taxonomy for the agentic-coding matrix (the "what").
# Source of truth for ROWS only — provider cells (the "how") are grounded automatically by
# scripts/build_matrix.py (catalog projection -> official docs -> Tavily). Add a capability
# here and the pipeline grounds all three provider cells. `hints` feed doc-page filtering +
# Tavily queries during grounding.

product_category: agentic-coding
capability_groups:
- name: Setup & extensibility
  layer: platform
  capabilities:
  - id: project-instruction-file
    name: Project-scoped instruction file
    what: A repo file giving the agent standing instructions and context.
    tier: core
    hints:
    - instruction file
    - CLAUDE.md
    - AGENTS.md
    - GEMINI.md
    - rules
    - global rules
    - project memory
    - context file
  - id: packaged-extensions
    name: Packaged reusable extensions
    what: A way to bundle reusable capabilities/instructions the agent can load.
    tier: core
    hints:
