name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The engine is offline-first: tests run against fixtures with a stub LLM — no
      # credentials, no network. Determinism is the whole point.
      - name: Run test suite (offline)
        run: TAXO_OFFLINE=1 python tests/run_all.py

      # Reproducible-build check: replay the committed evidence ledger and assert the
      # published catalog is byte-identical to what the evidence re-derives. Pure ledger
      # reads — no Vertex, no creds, no network.
      - name: Verify reproducible build (replay the evidence ledger)
        run: python -m taxonomy.cli verify

      # Capability-matrix gate (offline — no Vertex): the matrix must pass the schema +
      # definition-of-done validator, and the rendered .md must be in sync with the canonical
      # data/agentic-matrix.json (re-render and assert no drift). Re-grounding the cells needs
      # live Vertex and happens in the self-maintain loop, not here.
      - name: Validate capability matrix (schema + render drift)
        run: |
          python -m pip install --quiet "pyyaml>=6"
          python scripts/validate_matrix.py
          python scripts/render_matrix_md.py
          git diff --exit-code ai-provider-capability-taxonomy.md
